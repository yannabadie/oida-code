# Phase 4.7 (QA/A24.md, ADR-32) — provider regression baseline.
#
# Workflow_dispatch ONLY. NEVER fires on push, pull_request, or
# schedule — running an external LLM provider implies secrets and
# cost; both must be deliberate operator actions.
#
# Hard rules (ADR-30 + ADR-32):
#   * default `permissions: contents: read` (no write, no
#     security-events, no actions write)
#   * NO `pull_request_target` — the canonical "pwn request"
#     vulnerability surface
#   * provider externe NEVER runs on push or PR (workflow_dispatch
#     only)
#   * replay baseline ALWAYS runs first; provider runs second
#   * external provider requires both `provider-profile` AND the
#     corresponding `*_API_KEY` secret to be set on the calling
#     workflow's env: map
#   * the workflow body has zero `${{ secrets.* }}` references
#     INSIDE `run:` blocks — secrets travel via `env:` only and are
#     read as `$VAR` in bash (validator §6 enforces this for the
#     entire repo)
#   * artifacts contain ONLY metrics.json + a redacted summary —
#     no raw prompt, no raw provider response, no API key, no
#     unredacted error
#   * official_field_leak_count > 0 fails the run with exit code 3
#     (existing CLI gate)
name: provider-baseline

on:
  workflow_dispatch:
    inputs:
      provider-profile:
        description: |
          Provider profile to exercise. Must be one of:
          `deepseek` | `kimi` | `minimax` | `custom_openai_compatible`.
          DeepSeek is the recommended starting point per QA/A24.md
          §4.7.2 (OpenAI-format base URL, large context, JSON output).
        required: true
        default: deepseek
        type: choice
        options:
          - deepseek
          - kimi
          - minimax
          - custom_openai_compatible
      max-provider-cases:
        description: |
          Hard cap on `llm_estimator` cases routed to the external
          provider. The default 4 keeps a single run cheap; 0 means
          no cap (NOT recommended for the first few runs).
        required: true
        default: "4"
      compare-replay:
        description: |
          When `true` (default), the replay baseline runs FIRST and
          its metrics.json is uploaded alongside the provider run's.
          Set to `false` to skip the replay baseline (useful for
          quick provider re-tests after a known-good replay run).
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

concurrency:
  group: provider-baseline-${{ github.ref }}
  cancel-in-progress: true

jobs:

  baseline:
    name: provider regression baseline
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    # Phase 4.7 — secrets travel ONLY through env: (validator §6
    # forbids any `${{ secrets.* }}` inside run: blocks). The calling
    # operator pre-populates the appropriate secret on the repo;
    # only the secret matching `inputs.provider-profile` is read.
    env:
      PROVIDER_PROFILE: ${{ inputs.provider-profile }}
      MAX_PROVIDER_CASES: ${{ inputs.max-provider-cases }}
      COMPARE_REPLAY: ${{ inputs.compare-replay }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
      MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
      CUSTOM_OPENAI_COMPATIBLE_API_KEY:
        ${{ secrets.CUSTOM_OPENAI_COMPATIBLE_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"

      - name: Build calibration dataset (idempotent)
        run: python scripts/build_calibration_dataset.py

      - name: Replay baseline (always runs first when enabled)
        if: env.COMPARE_REPLAY == 'true'
        run: |
          mkdir -p .oida/provider-baseline/replay
          python -m oida_code.cli calibration-eval datasets/calibration_v1 \
            --llm-provider replay \
            --out .oida/provider-baseline/replay

      # Phase 4.7 — external provider step. Maps `provider-profile`
      # to the env-var NAME (never the value). The CLI flag
      # `--api-key-env` carries the env-var NAME; the value lives in
      # the runner's process env and is never echoed by the CLI
      # (existing 4.4.1 secret-redaction guards apply).
      - name: Resolve api-key-env name
        id: resolve_key
        run: |
          set -euo pipefail
          case "$PROVIDER_PROFILE" in
            deepseek)
              echo "name=DEEPSEEK_API_KEY" >> "$GITHUB_OUTPUT" ;;
            kimi)
              echo "name=KIMI_API_KEY" >> "$GITHUB_OUTPUT" ;;
            minimax)
              echo "name=MINIMAX_API_KEY" >> "$GITHUB_OUTPUT" ;;
            custom_openai_compatible)
              echo "name=CUSTOM_OPENAI_COMPATIBLE_API_KEY" \
                >> "$GITHUB_OUTPUT" ;;
            *)
              echo "::error::unknown provider-profile: $PROVIDER_PROFILE"
              exit 2 ;;
          esac

      - name: Provider regression (workflow_dispatch only)
        env:
          API_KEY_ENV_NAME: ${{ steps.resolve_key.outputs.name }}
        run: |
          set -euo pipefail
          mkdir -p ".oida/provider-baseline/$PROVIDER_PROFILE"
          # The CLI's existing 4.4 guard rejects an unset key with a
          # clear LLMProviderUnavailable; we don't re-check here to
          # avoid touching the secret value in bash.
          python -m oida_code.cli calibration-eval datasets/calibration_v1 \
            --llm-provider openai-compatible \
            --provider-profile "$PROVIDER_PROFILE" \
            --api-key-env "$API_KEY_ENV_NAME" \
            --max-provider-cases "$MAX_PROVIDER_CASES" \
            --out ".oida/provider-baseline/$PROVIDER_PROFILE"

      # Render a tiny redacted summary alongside metrics.json. Phase
      # 4.7 explicitly forbids storing the raw prompt or raw provider
      # response in artifacts; this step writes only the headline
      # metrics + a contract-compliance verdict.
      - name: Render redacted summary
        if: always()
        run: |
          python - <<'PY'
          import json, pathlib, os
          base = pathlib.Path(".oida/provider-baseline")
          for sub in sorted(p for p in base.iterdir() if p.is_dir()):
              metrics_path = sub / "metrics.json"
              if not metrics_path.is_file():
                  continue
              metrics = json.loads(metrics_path.read_text(encoding="utf-8"))
              lines = [
                  f"# Provider baseline — {sub.name}",
                  "",
                  f"- cases_evaluated: {metrics.get('cases_evaluated')}",
                  f"- official_field_leak_count: {metrics.get('official_field_leak_count')}",
                  f"- estimator_status_accuracy: {metrics.get('estimator_status_accuracy')}",
                  f"- estimator_estimate_accuracy: {metrics.get('estimator_estimate_accuracy')}",
                  f"- estimator_cases_evaluated: {metrics.get('estimator_cases_evaluated')}",
                  f"- estimator_cases_skipped: {metrics.get('estimator_cases_skipped')}",
                  f"- safety_block_rate: {metrics.get('safety_block_rate')}",
                  f"- fenced_injection_rate: {metrics.get('fenced_injection_rate')}",
              ]
              (sub / "report.md").write_text("\n".join(lines) + "\n", encoding="utf-8")
              with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as f:
                  f.write("\n".join(lines))
                  f.write("\n\n")
          PY

      - name: Upload provider-baseline artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: provider-baseline-${{ inputs.provider-profile }}
          path: .oida/provider-baseline/
