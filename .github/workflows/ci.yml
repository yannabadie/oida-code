# Phase 4.5-A (QA/A21.md, ADR-30) — internal CI for the oida-code repo.
#
# Hard rules (ADR-30):
#   * default permissions are read-only (`contents: read`); per-job
#     escalations are scoped to the job that needs them
#   * NO `pull_request_target` (would let untrusted PRs read repo
#     secrets — see GitHub's own pwn-vulnerability advisories)
#   * NO external LLM provider by default (`--llm-provider replay`)
#   * NO secrets used in this workflow — Phase 4.5 ships
#     contract-compliance gates only; provider regression runs are
#     a separate workflow_dispatch surface
#   * SARIF upload is gated to its own job which is the ONLY job that
#     gets `security-events: write`
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

# Workflow-level default — every job inherits read-only repo access
# unless it explicitly escalates.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  lint:
    name: ruff
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m ruff check src/ tests/ scripts/

  typecheck:
    name: mypy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m mypy src/

  test:
    name: pytest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      # Phase 4.5: external-provider tests are SKIPPED in CI by
      # default. The optional smoke fires only when the operator
      # explicitly sets this AND the relevant API key — neither is
      # set on the workflow.
      OIDA_RUN_EXTERNAL_PROVIDER_TESTS: "0"
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest -q

  calibration:
    name: calibration-eval (replay)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - name: Build pilot dataset
        run: python scripts/build_calibration_dataset.py
      - name: Run replay-only calibration eval
        run: |
          python -m oida_code.cli calibration-eval datasets/calibration_v1 \
            --out .oida/calibration_v1
      - name: Upload calibration artifacts
        uses: actions/upload-artifact@v4
        with:
          name: calibration-metrics
          path: .oida/calibration_v1/

  security-smoke:
    name: workflow security smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - name: Validate workflow files
        run: python scripts/validate_github_workflows.py

  # Phase 4.6-A (QA/A23.md, ADR-31) — verify the workflow + the
  # composite action survive the GitHub-announced switch to Node 24.
  # GitHub will start defaulting JavaScript-action runtimes to Node 24
  # on 2026-06-02; the opt-in env var lets us test it today. The job
  # is non-destructive: it only runs the validator and the Phase 4.5
  # invariant tests, which are the surfaces most likely to break if
  # an action vendor (checkout / setup-python / upload-artifact /
  # codeql-upload-sarif) ships a Node-24-incompatible build.
  node24-compat:
    name: Node 24 compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - name: Validate workflow files (Node 24 mode)
        run: python scripts/validate_github_workflows.py
      - name: Phase 4.5 invariants (Node 24 mode)
        run: python -m pytest tests/test_phase4_5_ci_github_action.py -q
      - name: Phase 4.6 invariants (Node 24 mode)
        run: python -m pytest tests/test_phase4_6_real_runner_smoke.py -q
