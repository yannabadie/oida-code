# Phase 5.8 (QA/A38) — operator-soak workflow.
#
# Manual / parametric surface for the Phase 5.8 operator-soak protocol.
# Distinct from `action-gateway-smoke.yml` on purpose:
#
#   * `action-gateway-smoke` = stable CI smoke against a fixed fixture.
#     No inputs, no per-case parameters; protects regression.
#   * `operator-soak` (this file) = on-demand operator experiment with
#     `case-id` / `target-ref` / `bundle-dir` / `output-dir` inputs.
#     Each run audits one operator-selected commit using one
#     operator-prepared replay bundle; the artefacts feed the
#     human-only `label.json` + `ux_score.json` step.
#
# Hard rules (ADR-41 / QA/A38):
#   * `workflow_dispatch` only — no `push`, no `schedule`,
#     no `pull_request`, no `pull_request_target`.
#   * `permissions: contents: read` at the workflow level; no
#     write tokens, no secrets read, no network egress beyond
#     what `actions/checkout` and `actions/upload-artifact` need.
#   * No external provider, no MCP, no provider tool-calling.
#   * All operator-controlled inputs are lifted into `env:` and
#     referenced as `$VAR` in `run:` blocks (Phase 4.5.1
#     anti-shell-injection rule). No `${{ inputs.* }}` is
#     interpolated directly inside any `run:` line.
#   * Dual checkout: `oida-main/` carries the action + bundles
#     (always from `main`); `oida-target/` carries the
#     operator-selected `target-ref` to be audited. This keeps
#     case branches independent of main's action surface.
name: operator-soak

on:
  workflow_dispatch:
    inputs:
      case-id:
        description: "Operator-soak case identifier (e.g. case_001_oida_code_self)."
        required: true
        type: string
      target-ref:
        description: "Branch, tag, or commit SHA to audit (e.g. operator-soak/case-001-docstring or 0309c63... for an external repo)."
        required: true
        type: string
      target-repo:
        description: "External repo to audit in <owner>/<name> form. Empty/omitted means audit this same repo (yannabadie/oida-code). For case_002+ external repos (e.g. python-semver/python-semver), pass the upstream identifier."
        required: false
        type: string
        default: ""
      target-install:
        description: "When true, runs `pip install -e .` inside oida-target/ before the gateway step. Required for cases where the audit subject ships a C extension or otherwise needs to be importable for pytest collection (e.g. case_003 markupsafe — the _speedups C-ext build is what makes pytest exercise both backends instead of skipping the parametrize cases). Default false to preserve case_001/case_002's no-install path."
        required: false
        type: boolean
        default: false
      bundle-dir:
        description: "Replay bundle path relative to main checkout (e.g. operator_soak_cases/case_001_oida_code_self/bundle)."
        required: true
        type: string
      output-dir:
        description: "Gateway output dir relative to main checkout."
        required: false
        type: string
        default: ".oida/operator-soak"

permissions:
  contents: read

concurrency:
  group: operator-soak-${{ inputs.case-id }}
  cancel-in-progress: false

jobs:

  soak:
    name: operator soak ${{ inputs.case-id }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      CASE_ID: ${{ inputs.case-id }}
      TARGET_REF: ${{ inputs.target-ref }}
      BUNDLE_DIR: ${{ inputs.bundle-dir }}
      OUTPUT_DIR: ${{ inputs.output-dir }}
    steps:

      # 1. Checkout main into oida-main/ — gives the action.yml,
      #    the bundle directory, and any other tooling that may have
      #    been added since the case branch was cut.
      - name: Checkout main (action + bundle)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
          persist-credentials: false
          path: oida-main

      # 2. Checkout the operator-selected target-ref into
      #    oida-target/ — this is what the gateway audits.
      #    Phase 5.8.1-D: ``inputs.target-repo`` lets the soak audit
      #    an EXTERNAL public repo (e.g. python-semver/python-semver
      #    for case_002). When empty (or omitted) the input falls back
      #    to ``${{ github.repository }}`` so the case_001 self-audit
      #    semantic survives unchanged. fetch-depth: 0 is required for
      #    older external commit SHAs that may not be reachable from
      #    the default branch tip.
      - name: Checkout target-ref (audit subject)
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.target-repo == '' && github.repository || inputs.target-repo }}
          ref: ${{ inputs.target-ref }}
          fetch-depth: 0
          persist-credentials: false
          path: oida-target

      # 3. Sanity-check that the operator-supplied bundle path
      #    actually resolves under main and contains the required
      #    files. The composite action's bundle validator will
      #    re-check structurally; this step gives a clearer
      #    operator error if the path is wrong.
      - name: Verify bundle directory exists
        working-directory: oida-main
        run: |
          set -euo pipefail
          if [ ! -d "$BUNDLE_DIR" ]; then
            echo "::error::bundle-dir '$BUNDLE_DIR' not found on main checkout" >&2
            exit 2
          fi
          echo "Bundle directory contents:"
          ls -la "$BUNDLE_DIR"

      # 3.5. Optional editable install of the target — required for
      #      cases where the audit subject ships a C extension or
      #      otherwise needs to be importable by pytest (e.g.
      #      case_003 markupsafe — without the editable install the
      #      _speedups C extension isn't built and conftest.py's
      #      pytest.mark.skipif fires, silently masking the
      #      dual-backend coverage the verifier asked about).
      #
      #      Phase 5.8.1-E: opt-in via ``inputs.target-install``.
      #      Default false — case_001 and case_002 ran the no-install
      #      path successfully and that contract is preserved. The
      #      composite action sets up Python in its own first step,
      #      so the install needs its own ``setup-python`` here (must
      #      pin the same 3.11 version the composite action uses to
      #      avoid version drift between install-time and pytest-time
      #      Python interpreters).
      - name: Set up Python (only if installing target)
        if: ${{ inputs.target-install }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Editable install of target (optional, opt-in)
        if: ${{ inputs.target-install }}
        working-directory: oida-target
        run: |
          set -euo pipefail
          echo "::group::pip install -e . inside oida-target/"
          python -m pip install --upgrade pip
          python -m pip install -e .
          echo "::endgroup::"

      # 4. Invoke the composite action from main, pointed at the
      #    target-ref checkout for the audit pass and at the
      #    main-checked-out bundle for the gateway replay.
      #    `enable-tool-gateway: "true"` is the explicit opt-in;
      #    `gateway-fail-on-contract: "false"` keeps the run
      #    diagnostic-only — operator soak measures usefulness,
      #    not contract enforcement.
      #
      # Path note: the composite action's "Run audit" step has no
      # explicit working-directory, so it runs from $GITHUB_WORKSPACE.
      # Both `repo-path` and `gateway-bundle-dir` are therefore passed
      # as ABSOLUTE paths (rooted at github.workspace) so resolution
      # is unambiguous regardless of the composite action's cwd.
      - name: Run operator-soak via composite action
        id: oida-action
        uses: ./oida-main
        with:
          repo-path: "${{ github.workspace }}/oida-target"
          base-ref: "HEAD~1"
          output-dir: "${{ github.workspace }}/oida-main/.oida"
          enable-tool-gateway: "true"
          gateway-bundle-dir: "${{ github.workspace }}/oida-main/${{ env.BUNDLE_DIR }}"
          gateway-output-dir: "${{ github.workspace }}/oida-main/${{ env.OUTPUT_DIR }}"
          gateway-fail-on-contract: "false"
          llm-provider: "replay"

      # 5. Append a small operator-readable summary block to the
      #    GitHub Step Summary. Values come from env so we never
      #    interpolate ${{ ... }} inside a run: line.
      - name: Append operator-soak metadata to step summary
        if: always()
        env:
          GATEWAY_STATUS: ${{ steps.oida-action.outputs.gateway-status }}
          GATEWAY_LEAKS: ${{ steps.oida-action.outputs.gateway-official-field-leak-count }}
          GATEWAY_REPORT: ${{ steps.oida-action.outputs.gateway-report-json }}
          GATEWAY_SUMMARY: ${{ steps.oida-action.outputs.gateway-summary-md }}
          GATEWAY_AUDIT: ${{ steps.oida-action.outputs.gateway-audit-log-dir }}
        run: |
          set -euo pipefail
          {
            echo "## operator-soak run for $CASE_ID"
            echo ""
            echo "Diagnostic-only — no product verdict. Operator labels and UX scores are written by humans (or via the cgpro decision channel) after triaging the artefacts uploaded below."
            echo ""
            echo "| field | value |"
            echo "|---|---|"
            echo "| case_id | \`$CASE_ID\` |"
            echo "| target-ref | \`$TARGET_REF\` |"
            echo "| bundle-dir | \`$BUNDLE_DIR\` |"
            echo "| output-dir | \`$OUTPUT_DIR\` |"
            echo "| gateway-status | \`$GATEWAY_STATUS\` |"
            echo "| gateway-official-field-leak-count | \`$GATEWAY_LEAKS\` |"
            echo "| gateway-report-json | \`$GATEWAY_REPORT\` |"
            echo "| gateway-summary-md | \`$GATEWAY_SUMMARY\` |"
            echo "| gateway-audit-log-dir | \`$GATEWAY_AUDIT\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      # 6. Upload the gateway artefacts. The operator (or cgpro)
      #    triages these in step 5 of operator_soak_cases/RUNBOOK.md.
      - name: Upload operator-soak artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: operator-soak-${{ inputs.case-id }}
          path: |
            oida-main/.oida/**
          if-no-files-found: warn
          retention-days: 14
