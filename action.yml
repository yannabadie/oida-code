name: oida-code
description: |
  AI code verifier — measures the gap between what AI-written code
  appears to do and what it actually guarantees. Phase 4.5 (ADR-30):
  reusable composite action that produces JSON / Markdown / SARIF
  artifacts. NO GitHub App, NO custom Checks API annotations, NO
  external LLM provider by default. Reports stay diagnostic only;
  ADR-22 keeps `total_v_net` / `debt_final` / `corrupt_success` null
  in production.

author: yannabadie

branding:
  color: blue
  icon: shield

inputs:
  repo-path:
    description: |
      Path to the repo to audit, relative to the workflow's
      `github.workspace`. Default `"."` audits the checkout root.
    required: false
    default: "."
  base-ref:
    description: Git revision to diff against (e.g. `origin/main`).
    required: false
    default: "origin/main"
  intent-file:
    description: |
      Optional path to a Markdown file describing the change's
      intent (used as the `IntentSpec.summary` source). Operator-
      supplied content is treated as untrusted data — never fed to
      the deterministic verifier as instructions.
    required: false
    default: ""
  output-dir:
    description: Where artifact JSON / Markdown / SARIF land.
    required: false
    default: ".oida"
  upload-sarif:
    description: |
      "true" → upload `${output-dir}/report.sarif` via
      `github/codeql-action/upload-sarif`. The action's caller MUST
      grant `security-events: write` to the JOB that runs this with
      `upload-sarif: true` (NOT the whole workflow). When "false",
      no SARIF upload happens and `security-events` is not needed.
    required: false
    default: "false"
  fail-on:
    description: |
      `none` (default) | `any_critical` | `corrupt`. Mirrors the
      `--fail-on` flag on `oida-code audit`. This is a legacy
      deterministic-audit control, not an official OIDA
      `corrupt_success` field and not a merge-readiness verdict. The
      action exits non-zero when the chosen condition holds.
    required: false
    default: "none"
  surface:
    description: |
      `impact` (default) or `changed` — passed to `oida-code
      normalize --surface`.
    required: false
    default: "impact"
  enable-shadow:
    description: |
      RESERVED / NOT YET WIRED (Phase 4.5.2-E, QA/A22.md). The input
      is accepted for forward-compatibility but currently ignored by
      the action body. A future release (tracked under Phase 4.6+)
      will, when this is `"true"`, run `oida-code score-trace` with
      `--experimental-shadow-fusion`. The shadow report would be
      non-authoritative by ADR-22 / ADR-23.
    required: false
    default: "false"
  enable-tool-gateway:
    description: |
      EXPERIMENTAL OPT-IN (Phase 5.6, QA/A33.md, ADR-41). When
      `"true"`, the action additionally runs the gateway-grounded
      verifier (`oida-code verify-grounded`) against the bundle
      under `gateway-bundle-dir`. Default stays `"false"` — the
      gateway path is NOT the default audit path. The opt-in
      path is replay-only by construction: no MCP, no JSON-RPC,
      no provider tool-calling, no write or network tools, no
      official `total_v_net` / `debt_final` / `corrupt_success`.
      The action refuses to run the gateway path on
      `pull_request` / `pull_request_target` events (anti-RCE
      guard — pytest can execute repo code, so the gateway
      MUST NOT touch unverified PR contributions).
    required: false
    default: "false"
  gateway-bundle-dir:
    description: |
      Phase 5.6 (ADR-41): directory holding the eight required
      gateway-bundle files (`packet.json`, `pass1_forward.json`,
      `pass1_backward.json`, `pass2_forward.json`,
      `pass2_backward.json`, `tool_policy.json`,
      `gateway_definitions.json`, `approved_tools.json`). The
      bundle MUST be inside `$GITHUB_WORKSPACE` and pass
      `oida-code validate-gateway-bundle` (rejects path
      traversal, secret-shaped filenames, provider/MCP config).
      Required when `enable-tool-gateway: "true"`.
    required: false
    default: ""
  gateway-output-dir:
    description: |
      Phase 5.6 (ADR-41): where gateway artifacts (grounded
      report JSON, audit log dir, Markdown summary, action
      outputs file) land. Default: `.oida/gateway-grounded`.
    required: false
    default: ".oida/gateway-grounded"
  gateway-fail-on-contract:
    description: |
      Phase 5.6 (ADR-41): when `"true"`, exit non-zero if a
      contract violation is detected (official-field leak
      count > 0, bundle validation rejected, PR-context guard
      tripped). Findings/blockers from the gateway run are
      diagnostic only and NEVER trigger a fail-on-contract
      exit. Default `"false"` keeps the gateway path
      diagnostic-only.
    required: false
    default: "false"
  llm-provider:
    description: |
      Phase 4.4.1 / 4.5: provider for the optional `llm_estimator`
      family of the calibration dataset. Default `replay` (per-case
      fixture). `openai-compatible` opts in to a real external
      provider — requires `provider-profile` + the appropriate
      `api_key_env` to be set as a GitHub Actions secret AND fed
      to the action via `env:`. The action itself will refuse to
      run an external provider on a `pull_request` event from a
      fork (anti-secret-exfil guard).
    required: false
    default: "replay"
  provider-profile:
    description: |
      Phase 4.4.1 / 4.5: provider-profile name when
      `llm-provider=openai-compatible` (deepseek / kimi / minimax /
      custom_openai_compatible).
    required: false
    default: ""
  api-key-env:
    description: |
      Phase 4.4.1 / 4.5: env var name carrying the API key. The
      action NEVER reads or stores the key value; it just passes the
      env var name to `oida-code calibration-eval --api-key-env`.
    required: false
    default: ""
  max-provider-cases:
    description: |
      Phase 4.4.1 / 4.5: cap on llm_estimator cases routed to a
      non-replay provider. 0 = no cap. Useful as a cost ceiling on
      external runs.
    required: false
    default: "0"

outputs:
  report-json:
    description: Path to the JSON audit report.
    value: ${{ steps.run.outputs.report-json }}
  report-markdown:
    description: Path to the Markdown audit report.
    value: ${{ steps.run.outputs.report-markdown }}
  report-sarif:
    description: Path to the SARIF audit report.
    value: ${{ steps.run.outputs.report-sarif }}
  calibration-metrics:
    description: Path to the calibration metrics JSON.
    value: ${{ steps.run.outputs.calibration-metrics }}
  diagnostic-markdown:
    description: |
      Phase 4.9-A (ADR-34): path to the polished diagnostic Markdown
      report (banner + status card + provider matrix + redacted-IO
      links + "what this does NOT prove" section). Diagnostic-only
      by ADR-22.
    value: ${{ steps.run.outputs.diagnostic-markdown }}
  diagnostic-status:
    description: |
      Phase 4.9-D (ADR-34): one of `blocked` /
      `contract_failed` / `contract_clean` / `diagnostic_only`.
      No other value is producible — the CLI's emitter is statically
      constrained to a four-value Literal type. See ADR-34 for the
      rationale on why merge-readiness / production-readiness /
      verification labels are NOT emitted by this action.
    value: ${{ steps.run.outputs.diagnostic-status }}
  official-field-leaks:
    description: |
      Phase 4.9-D (ADR-34): integer count of detected
      official-field leaks. ADR-22 hard wall — any value > 0 means
      the runtime gate fired and the action exits non-zero.
    value: ${{ steps.run.outputs.official-field-leaks }}
  artifact-manifest:
    description: |
      Phase 4.9-F (ADR-34): path to the artifact bundle manifest
      (`<output-dir>/artifacts/manifest.json`). The manifest pins
      `mode=diagnostic_only` and `official_fields_emitted=false`
      via the Pydantic Literal schema — drift is unrepresentable.
      Each listed artifact carries a SHA256 hash for tamper
      detection.
    value: ${{ steps.run.outputs.artifact-manifest }}
  gateway-report-json:
    description: |
      Phase 5.6 (ADR-41): path to the gateway-grounded verifier
      JSON report when `enable-tool-gateway: "true"`. Empty
      string when the gateway path is disabled.
    value: ${{ steps.gateway.outputs.gateway-report-json }}
  gateway-summary-md:
    description: |
      Phase 5.6 (ADR-41): path to the diagnostic-only Markdown
      summary rendered by `oida-code render-gateway-summary`.
      Empty string when the gateway path is disabled.
    value: ${{ steps.gateway.outputs.gateway-summary-md }}
  gateway-audit-log-dir:
    description: |
      Phase 5.6 (ADR-41): path to the per-day per-tool gateway
      audit log directory. Empty string when the gateway path
      is disabled.
    value: ${{ steps.gateway.outputs.gateway-audit-log-dir }}
  gateway-status:
    description: |
      Phase 5.6 (ADR-41): one of `disabled` / `diagnostic_only`
      / `contract_clean` / `contract_failed` / `blocked`. The
      five-value enum is structurally pinned via a Python
      `Literal[...]` in `oida_code.action_gateway.status`;
      product verdicts (`merge_safe` / `verified` /
      `production_safe` / `bug_free`) are unrepresentable.
    value: ${{ steps.gateway.outputs.gateway-status }}
  gateway-official-field-leak-count:
    description: |
      Phase 5.6 (ADR-41): integer count of forbidden
      product-verdict / official-field tokens detected in the
      grounded report. ADR-22 hard wall — any value > 0 means
      the runtime gate fired.
    value: ${{ steps.gateway.outputs.gateway-official-field-leak-count }}

runs:
  using: composite
  steps:

    - name: Phase 4.5 — block external provider on fork PRs
      if: |
        inputs.llm-provider == 'openai-compatible'
        && github.event_name == 'pull_request'
        && github.event.pull_request.head.repo.full_name != github.repository
      shell: bash
      run: |
        echo "::error::OIDA-code action: external LLM provider is forbidden on pull-request events from forks (ADR-30 anti-secret-exfil guard)."
        exit 2

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install oida-code
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install -e ".[dev]"
      working-directory: ${{ github.action_path }}

    - name: Run audit
      id: run
      shell: bash
      # ADR-30 + Phase 4.5.1: every PR-influenced value travels via
      # `env:` and is referenced as a bash variable in `run:`. Direct
      # `${{ inputs.X }}` interpolation inside a `run:` block is a
      # documented shell-injection anti-pattern (a malicious branch
      # name could break out of the heredoc quoting). The mapping
      # below is the GitHub-recommended intermediate-env-var pattern.
      env:
        OIDA_RUN_EXTERNAL_PROVIDER_TESTS: "0"
        REPO_PATH: ${{ inputs.repo-path }}
        BASE_REF: ${{ inputs.base-ref }}
        INTENT_FILE: ${{ inputs.intent-file }}
        OUTPUT_DIR: ${{ inputs.output-dir }}
        FAIL_ON: ${{ inputs.fail-on }}
        LLM_PROVIDER: ${{ inputs.llm-provider }}
        PROVIDER_PROFILE: ${{ inputs.provider-profile }}
        API_KEY_ENV: ${{ inputs.api-key-env }}
        MAX_PROVIDER_CASES: ${{ inputs.max-provider-cases }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        set -euo pipefail
        mkdir -p "$OUTPUT_DIR"

        # Inspect → normalize → audit (deterministic gates only).
        python -m oida_code.cli inspect "$REPO_PATH" \
          --base "$BASE_REF" \
          --out "$OUTPUT_DIR/request.json"

        EXTRA_AUDIT=()
        if [[ -n "$INTENT_FILE" ]]; then
          EXTRA_AUDIT+=("--intent" "$INTENT_FILE")
        fi

        python -m oida_code.cli audit "$REPO_PATH" \
          --base "$BASE_REF" \
          --format markdown \
          --out "$OUTPUT_DIR/report.md" \
          --fail-on "$FAIL_ON" \
          "${EXTRA_AUDIT[@]}" || AUDIT_EXIT=$?

        python -m oida_code.cli audit "$REPO_PATH" \
          --base "$BASE_REF" \
          --format json \
          --out "$OUTPUT_DIR/report.json" \
          --fail-on none \
          "${EXTRA_AUDIT[@]}" || true

        python -m oida_code.cli audit "$REPO_PATH" \
          --base "$BASE_REF" \
          --format sarif \
          --out "$OUTPUT_DIR/report.sarif" \
          --fail-on none \
          "${EXTRA_AUDIT[@]}" || true

        # Optional calibration eval. Default `replay` keeps it
        # hermetic; passing --llm-provider openai-compatible opts in.
        CAL_OUT="$OUTPUT_DIR/calibration"
        mkdir -p "$CAL_OUT"
        if [[ -d "$ACTION_PATH/datasets/calibration_v1" ]]; then
          CAL_ARGS=("calibration-eval" "$ACTION_PATH/datasets/calibration_v1"
                    "--out" "$CAL_OUT"
                    "--llm-provider" "$LLM_PROVIDER"
                    "--max-provider-cases" "$MAX_PROVIDER_CASES")
          if [[ "$LLM_PROVIDER" == "openai-compatible" ]]; then
            if [[ -z "$PROVIDER_PROFILE" ]]; then
              echo "::error::provider-profile is required when llm-provider=openai-compatible"
              exit 2
            fi
            CAL_ARGS+=("--provider-profile" "$PROVIDER_PROFILE")
            if [[ -n "$API_KEY_ENV" ]]; then
              CAL_ARGS+=("--api-key-env" "$API_KEY_ENV")
            fi
          fi
          python -m oida_code.cli "${CAL_ARGS[@]}" || true
        fi

        # Phase 4.9-A — render the polished diagnostic Markdown so
        # the step summary and PR comment stay readable. Falls back
        # gracefully if metrics.json is missing (e.g., dataset dir
        # absent on this runner).
        DIAGNOSTIC_MD="$OUTPUT_DIR/diagnostic.md"
        if [[ -f "$CAL_OUT/metrics.json" ]]; then
          python -m oida_code.cli render-artifacts "$CAL_OUT" \
            --out "$DIAGNOSTIC_MD" \
            --format markdown || true
        fi

        echo "report-json=$OUTPUT_DIR/report.json" >> "$GITHUB_OUTPUT"
        echo "report-markdown=$OUTPUT_DIR/report.md" >> "$GITHUB_OUTPUT"
        echo "report-sarif=$OUTPUT_DIR/report.sarif" >> "$GITHUB_OUTPUT"
        echo "calibration-metrics=$CAL_OUT/metrics.json" >> "$GITHUB_OUTPUT"
        if [[ -f "$DIAGNOSTIC_MD" ]]; then
          echo "diagnostic-markdown=$DIAGNOSTIC_MD" >> "$GITHUB_OUTPUT"
        fi

        # Phase 4.9-D — surface the diagnostic-status enum +
        # official-field-leaks count as discrete action outputs.
        # CLI writes <CAL_OUT>/action_outputs.txt as key=value lines
        # exactly compatible with the GITHUB_OUTPUT format. Falls
        # back to safe defaults when the file is missing.
        if [[ -f "$CAL_OUT/action_outputs.txt" ]]; then
          cat "$CAL_OUT/action_outputs.txt" >> "$GITHUB_OUTPUT"
        else
          echo "diagnostic-status=diagnostic_only" >> "$GITHUB_OUTPUT"
          echo "official-field-leaks=0" >> "$GITHUB_OUTPUT"
        fi

        # Phase 4.9-F — build the artifact bundle manifest covering
        # every file produced under $OUTPUT_DIR. The manifest pins
        # mode=diagnostic_only / official_fields_emitted=false /
        # contains_secrets=false at the schema level (Literal),
        # making any future drift unrepresentable.
        python -m oida_code.cli build-artifact-manifest "$OUTPUT_DIR" || true
        if [[ -f "$OUTPUT_DIR/artifacts/manifest.json" ]]; then
          echo "artifact-manifest=$OUTPUT_DIR/artifacts/manifest.json" >> "$GITHUB_OUTPUT"
        fi

        # Phase 4.9-B — Step summary uses the polished diagnostic
        # Markdown when available, falling back to the legacy audit
        # report excerpt + calibration headline.
        if [[ -f "$DIAGNOSTIC_MD" ]]; then
          cat "$DIAGNOSTIC_MD" >> "$GITHUB_STEP_SUMMARY"
        elif [[ -f "$OUTPUT_DIR/report.md" ]]; then
          {
            echo "## OIDA-code audit"
            echo
            head -n 80 "$OUTPUT_DIR/report.md"
          } >> "$GITHUB_STEP_SUMMARY"
        fi
        if [[ -f "$CAL_OUT/metrics.json" ]] && [[ ! -f "$DIAGNOSTIC_MD" ]]; then
          {
            echo
            echo "## Calibration metrics"
            echo
            echo '```json'
            head -n 30 "$CAL_OUT/metrics.json"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
        fi

        exit "${AUDIT_EXIT:-0}"

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: oida-code-audit
        path: ${{ inputs.output-dir }}/

    - name: Upload SARIF (optional)
      # Phase 4.7 (ADR-32) bumped from `@v3` (deprecated December
      # 2026) to `@v4`. Phase 4.9-C adds an explicit `category` so
      # multiple SARIF uploads on the same commit do not collapse
      # into one Code Scanning analysis.
      if: inputs.upload-sarif == 'true'
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: ${{ inputs.output-dir }}/report.sarif
        category: oida-code/combined

    # ------------------------------------------------------------
    # Phase 5.6 (QA/A33.md, ADR-41) — opt-in gateway-grounded path
    # ------------------------------------------------------------
    # Hard rules:
    #   * default off (`enable-tool-gateway: "false"`)
    #   * never on `pull_request` / `pull_request_target` (pytest
    #     can execute repo code; PR contributions are untrusted)
    #   * replay-only — no external provider, no MCP, no
    #     write / network tools
    #   * NO official `total_v_net` / `debt_final` /
    #     `corrupt_success`; the gateway-status enum is a
    #     5-value Literal pinned in Python
    - name: Phase 5.6 — block gateway on PR / fork PR
      if: |
        inputs.enable-tool-gateway == 'true'
        && (github.event_name == 'pull_request'
            || github.event_name == 'pull_request_target')
      shell: bash
      run: |
        echo "::error::OIDA-code action: enable-tool-gateway=true is forbidden on pull_request / pull_request_target events (Phase 5.6 / ADR-41 anti-RCE guard — pytest can execute repo code)."
        exit 2

    - name: Phase 5.6 — gateway-grounded verifier (opt-in)
      id: gateway
      shell: bash
      # ADR-30 + Phase 4.5.1 + Phase 5.6 §5.6-H: every
      # operator-controlled value travels through `env:` and is
      # referenced as a bash variable in `run:`. Direct `${{
      # inputs.X }}` interpolation inside a `run:` block is a
      # documented shell-injection vector. The step always runs
      # (so `steps.gateway.outputs.gateway-status` is always set);
      # the body branches on ENABLE_TOOL_GATEWAY.
      env:
        ENABLE_TOOL_GATEWAY: ${{ inputs.enable-tool-gateway }}
        BUNDLE_DIR: ${{ inputs.gateway-bundle-dir }}
        GATEWAY_OUTPUT_DIR: ${{ inputs.gateway-output-dir }}
        GATEWAY_FAIL_ON_CONTRACT: ${{ inputs.gateway-fail-on-contract }}
        GH_WORKSPACE: ${{ github.workspace }}
        # Phase 5.8.1-C: thread the audit-subject directory through to
        # the verifier so the bundle's ``tool_policy.repo_root="."``
        # placeholder is overridden at runtime. Same operator-supplied
        # value as the audit step above (line 269), forwarded into the
        # gateway step's shell environment via env: so the bash body
        # can pass it as ``--repo-root "$REPO_PATH"``.
        REPO_PATH: ${{ inputs.repo-path }}
      run: |
        set -euo pipefail

        # Disabled path — emit known-empty outputs so downstream
        # callers always see the five gateway-* keys.
        if [[ "$ENABLE_TOOL_GATEWAY" != "true" ]]; then
          {
            echo "gateway-status=disabled"
            echo "gateway-report-json="
            echo "gateway-summary-md="
            echo "gateway-audit-log-dir="
            echo "gateway-official-field-leak-count=0"
          } >> "$GITHUB_OUTPUT"
          exit 0
        fi

        if [[ -z "$BUNDLE_DIR" ]]; then
          echo "::error::enable-tool-gateway=true requires gateway-bundle-dir to be set."
          {
            echo "gateway-status=blocked"
            echo "gateway-report-json="
            echo "gateway-summary-md="
            echo "gateway-audit-log-dir="
            echo "gateway-official-field-leak-count=0"
          } >> "$GITHUB_OUTPUT"
          exit 2
        fi
        mkdir -p "$GATEWAY_OUTPUT_DIR"
        AUDIT_DIR="$GATEWAY_OUTPUT_DIR/audit"
        REPORT_JSON="$GATEWAY_OUTPUT_DIR/grounded_report.json"
        SUMMARY_MD="$GATEWAY_OUTPUT_DIR/summary.md"
        OUTPUTS_FILE="$GATEWAY_OUTPUT_DIR/action_outputs.txt"

        # 1) Bundle validation — contract-failed on rejection.
        if ! python -m oida_code.cli validate-gateway-bundle \
              "$BUNDLE_DIR" --workspace-root "$GH_WORKSPACE"; then
          python -m oida_code.cli emit-gateway-status \
            --out "$OUTPUTS_FILE" \
            --enabled --not-blocked --bundle-invalid \
            --report-json "" --summary-md "" \
            --audit-log-dir ""
          python -m oida_code.cli render-gateway-summary \
            "$REPORT_JSON" \
            --out "$SUMMARY_MD" \
            --status contract_failed \
            --audit-log-dir "$AUDIT_DIR" \
            --bundle-dir "$BUNDLE_DIR" \
            --enabled --absent
          cat "$SUMMARY_MD" >> "$GITHUB_STEP_SUMMARY"
          cat "$OUTPUTS_FILE" >> "$GITHUB_OUTPUT"
          if [[ "$GATEWAY_FAIL_ON_CONTRACT" == "true" ]]; then
            exit 3
          fi
          exit 0
        fi

        # 2) Run the gateway-grounded verifier.
        # Phase 5.8.1-C: pass --repo-root="$REPO_PATH" so the bundle's
        # tool_policy.repo_root (typically ".", which would resolve to
        # the workflow's cwd = $GITHUB_WORKSPACE root and miss the
        # audit subject when oida-main/ holds the bundle and oida-target/
        # holds the code) is overridden by the actual audit-subject
        # directory the workflow already supplied via repo-path.
        python -m oida_code.cli verify-grounded \
          "$BUNDLE_DIR/packet.json" \
          --forward-replay-1 "$BUNDLE_DIR/pass1_forward.json" \
          --backward-replay-1 "$BUNDLE_DIR/pass1_backward.json" \
          --forward-replay-2 "$BUNDLE_DIR/pass2_forward.json" \
          --backward-replay-2 "$BUNDLE_DIR/pass2_backward.json" \
          --tool-policy "$BUNDLE_DIR/tool_policy.json" \
          --approved-tools "$BUNDLE_DIR/approved_tools.json" \
          --gateway-definitions "$BUNDLE_DIR/gateway_definitions.json" \
          --audit-log-dir "$AUDIT_DIR" \
          --out "$REPORT_JSON" \
          --repo-root "$REPO_PATH"

        # 3) Emit the action outputs.
        python -m oida_code.cli emit-gateway-status \
          --out "$OUTPUTS_FILE" \
          --enabled --not-blocked --bundle-valid \
          --grounded-report "$REPORT_JSON" \
          --report-json "$REPORT_JSON" \
          --summary-md "$SUMMARY_MD" \
          --audit-log-dir "$AUDIT_DIR"

        GATEWAY_STATUS=$(grep '^gateway-status=' "$OUTPUTS_FILE" | head -n1 | cut -d= -f2)

        # 4) Render the diagnostic-only summary.
        python -m oida_code.cli render-gateway-summary \
          "$REPORT_JSON" \
          --out "$SUMMARY_MD" \
          --status "$GATEWAY_STATUS" \
          --audit-log-dir "$AUDIT_DIR" \
          --bundle-dir "$BUNDLE_DIR" \
          --enabled

        # 5) Reuse the Phase 4.9-F manifest builder.
        python -m oida_code.cli build-artifact-manifest \
          "$GATEWAY_OUTPUT_DIR" || true

        # 6) Append summary + emit outputs.
        cat "$SUMMARY_MD" >> "$GITHUB_STEP_SUMMARY"
        cat "$OUTPUTS_FILE" >> "$GITHUB_OUTPUT"

        # 7) Optional fail-on-contract gate.
        LEAK=$(grep '^gateway-official-field-leak-count=' "$OUTPUTS_FILE" | head -n1 | cut -d= -f2)
        if [[ "$GATEWAY_FAIL_ON_CONTRACT" == "true" && "${LEAK:-0}" -gt 0 ]]; then
          echo "::error::gateway-official-field-leak-count=$LEAK > 0 — ADR-22 hard wall breach."
          exit 3
        fi

    - name: Phase 5.6 — upload gateway artifacts
      if: inputs.enable-tool-gateway == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: oida-code-gateway
        path: ${{ inputs.gateway-output-dir }}/
